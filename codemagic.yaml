workflows:
  android-debug:
    name: TradeVibe Android Debug
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd app
          npm install
      - name: Build Android APK
        script: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/android/app/build/outputs/apk/debug/app-debug.apk
