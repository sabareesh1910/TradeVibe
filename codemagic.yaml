workflows:
  android-debug:
    name: TradeVibe Android Debug
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd tradevibe-complete/tradevibe/app
          npm install

      - name: Create Gradle wrapper
        script: |
          APP=tradevibe-complete/tradevibe/app
          mkdir -p $APP/android/gradle/wrapper

          curl -L -o $APP/android/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar"

          cat > $APP/android/gradle/wrapper/gradle-wrapper.properties << EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          wget -O $APP/android/gradlew \
            "https://raw.githubusercontent.com/ReactiveX/RxAndroid/3.x/gradlew"
          chmod +x $APP/android/gradlew

      - name: Build Android APK
        script: |
          APP=$CM_BUILD_DIR/tradevibe-complete/tradevibe/app
          cd $APP/android
          ./gradlew assembleDebug --no-daemon --stacktrace

    artifacts:
      - tradevibe-complete/tradevibe/app/android/app/build/outputs/apk/debug/*.apk
