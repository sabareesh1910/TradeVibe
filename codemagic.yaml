workflows:
  android-debug:
    name: TradeVibe Android Debug
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd tradevibe-complete/tradevibe/app
          npm install

      - name: Generate Gradle wrapper
        script: |
          cd tradevibe-complete/tradevibe/app/android
          gradle wrapper --gradle-version 8.3

      - name: Make gradlew executable
        script: |
          chmod +x tradevibe-complete/tradevibe/app/android/gradlew

      - name: Fix gradle-wrapper.properties
        script: |
          echo "distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists" > tradevibe-complete/tradevibe/app/android/gradle/wrapper/gradle-wrapper.properties

      - name: Build Android APK
        script: |
          cd tradevibe-complete/tradevibe/app/android
          ./gradlew assembleDebug --no-daemon --warning-mode all

    artifacts:
      - tradevibe-complete/tradevibe/app/android/app/build/outputs/apk/debug/*.apk
