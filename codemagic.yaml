workflows:
  android-debug:
    name: TradeVibe Android Debug
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd tradevibe-complete/tradevibe/app
          npm install

      - name: Generate Gradle wrapper
        script: |
          cd tradevibe-complete/tradevibe/app/android
          gradle wrapper --gradle-version 8.6

      - name: Make gradlew executable
        script: |
          chmod +x tradevibe-complete/tradevibe/app/android/gradlew

      - name: Build Android APK
        script: |
          cd tradevibe-complete/tradevibe/app/android
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - tradevibe-complete/tradevibe/app/android/app/build/outputs/apk/debug/*.apk
