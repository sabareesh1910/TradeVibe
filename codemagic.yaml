workflows:
  android-debug:
    name: TradeVibe Android Debug
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd tradevibe-complete/tradevibe/app
          npm install

      - name: Download Gradle wrapper directly
        script: |
          mkdir -p tradevibe-complete/tradevibe/app/android/gradle/wrapper
          curl -o tradevibe-complete/tradevibe/app/android/gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar
          cat > tradevibe-complete/tradevibe/app/android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -o tradevibe-complete/tradevibe/app/android/gradlew \
            https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradlew
          chmod +x tradevibe-complete/tradevibe/app/android/gradlew

      - name: Build Android APK
        script: |
          export JAVA_HOME=$CM_JAVA_HOME
          cd tradevibe-complete/tradevibe/app/android
          ./gradlew assembleDebug --no-daemon --stacktrace

    artifacts:
      - tradevibe-complete/tradevibe/app/android/app/build/outputs/apk/debug/*.apk
