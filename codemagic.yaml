workflows:
  android-debug:
    name: TradeVibe Android Debug
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd tradevibe-complete/tradevibe/app
          npm install

      - name: Setup Gradle wrapper
        script: |
          APP=$CM_BUILD_DIR/tradevibe-complete/tradevibe/app
          mkdir -p $APP/android/gradle/wrapper

          # Download gradle-wrapper.jar directly from Maven Central
          curl -L -o $APP/android/gradle/wrapper/gradle-wrapper.jar \
            "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.6/gradle-wrapper-8.6.jar"

          # Verify jar downloaded correctly
          ls -lh $APP/android/gradle/wrapper/gradle-wrapper.jar
          file $APP/android/gradle/wrapper/gradle-wrapper.jar

          printf '%s\n' \
            'distributionBase=GRADLE_USER_HOME' \
            'distributionPath=wrapper/dists' \
            'distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-all.zip' \
            'zipStoreBase=GRADLE_USER_HOME' \
            'zipStorePath=wrapper/dists' \
            > $APP/android/gradle/wrapper/gradle-wrapper.properties

          chmod +x $APP/android/gradlew

      - name: Verify wrapper
        script: |
          APP=$CM_BUILD_DIR/tradevibe-complete/tradevibe/app
          echo "--- gradlew content ---"
          cat $APP/android/gradlew
          echo "--- wrapper jar ---"
          ls -lh $APP/android/gradle/wrapper/
          echo "--- properties ---"
          cat $APP/android/gradle/wrapper/gradle-wrapper.properties

      - name: Build Android APK
        script: |
          APP=$CM_BUILD_DIR/tradevibe-complete/tradevibe/app
          cd $APP/android
          java -version
          ./gradlew assembleDebug --no-daemon --stacktrace

    artifacts:
      - tradevibe-complete/tradevibe/app/android/app/build/outputs/apk/debug/*.apk
