workflows:
  android-debug:
    name: TradeVibe Android Debug
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd tradevibe-complete/tradevibe/app
          npm install

      - name: Fix gradle-wrapper.properties
        script: |
          APP=$CM_BUILD_DIR/tradevibe-complete/tradevibe/app
          printf '%s\n' \
            'distributionBase=GRADLE_USER_HOME' \
            'distributionPath=wrapper/dists' \
            'distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-all.zip' \
            'zipStoreBase=GRADLE_USER_HOME' \
            'zipStorePath=wrapper/dists' \
            > $APP/android/gradle/wrapper/gradle-wrapper.properties

      - name: Install Gradle 8.6
        script: |
          curl -L https://services.gradle.org/distributions/gradle-8.6-bin.zip \
            -o /tmp/gradle-8.6-bin.zip
          unzip -q /tmp/gradle-8.6-bin.zip -d /tmp/
          export PATH=/tmp/gradle-8.6/bin:$PATH
          gradle --version

      - name: Build Android APK
        script: |
          export PATH=/tmp/gradle-8.6/bin:$PATH
          APP=$CM_BUILD_DIR/tradevibe-complete/tradevibe/app
          cd $APP/android
          gradle assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            2>&1 | head -150

    artifacts:
      - tradevibe-complete/tradevibe/app/android/app/build/outputs/apk/debug/*.apk
