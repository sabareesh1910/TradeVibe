workflows:
  android-debug:
    name: TradeVibe Android Debug
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd tradevibe-complete/tradevibe/app
          npm install

      - name: Setup Gradle wrapper
        script: |
          APP=$CM_BUILD_DIR/tradevibe-complete/tradevibe/app
          mkdir -p $APP/android/gradle/wrapper

          curl -L \
            "https://services.gradle.org/distributions/gradle-8.6-bin.zip" \
            -o /tmp/gradle-8.6-bin.zip
          unzip -j /tmp/gradle-8.6-bin.zip \
            "gradle-8.6/lib/plugins/gradle-wrapper-*.jar" \
            -d /tmp/gradle-jar/ || true
          unzip -j /tmp/gradle-8.6-bin.zip \
            "gradle-8.6/lib/gradle-wrapper-*.jar" \
            -d /tmp/gradle-jar/ || true
          cp /tmp/gradle-jar/*.jar \
            $APP/android/gradle/wrapper/gradle-wrapper.jar

          printf '%s\n' \
            'distributionBase=GRADLE_USER_HOME' \
            'distributionPath=wrapper/dists' \
            'distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-all.zip' \
            'zipStoreBase=GRADLE_USER_HOME' \
            'zipStorePath=wrapper/dists' \
            > $APP/android/gradle/wrapper/gradle-wrapper.properties

          chmod +x $APP/android/gradlew
          ls -la $APP/android/gradle/wrapper/

      - name: Build Android APK
        script: |
          APP=$CM_BUILD_DIR/tradevibe-complete/tradevibe/app
          cd $APP/android
          ./gradlew assembleDebug --no-daemon --stacktrace

    artifacts:
      - tradevibe-complete/tradevibe/app/android/app/build/outputs/apk/debug/*.apk
