name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install dependencies
        run: |
          cd tradevibe-complete/tradevibe/app
          npm install

      - name: Setup Gradle wrapper
        run: |
          cd tradevibe-complete/tradevibe/app/android
          curl -L https://services.gradle.org/distributions/gradle-8.6-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          mkdir -p gradle/wrapper
          find /tmp/gradle-8.6 -name "gradle-wrapper.jar" -exec cp {} gradle/wrapper/ \;
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.6-all.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: Build APK
        run: |
          cd tradevibe-complete/tradevibe/app/android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeVibe-debug
          path: tradevibe-complete/tradevibe/app/android/app/build/outputs/apk/debug/app-debug.apk
