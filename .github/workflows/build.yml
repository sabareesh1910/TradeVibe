name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install dependencies
        run: |
          cd tradevibe-complete/tradevibe/app
          npm install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      - name: Build APK
        run: |
          cd tradevibe-complete/tradevibe/app/android
          gradle assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeVibe-debug
          path: tradevibe-complete/tradevibe/app/android/app/build/outputs/apk/debug/app-debug.apk
